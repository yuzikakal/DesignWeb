<style>
    .footer {
        background-color: #ff80d5;
        color: rgba(23, 3, 31, 0.85);
        font-family: 'Poppins', sans-serif; /* GANTI KE POPPINS */
        padding: 50px 80px 20px 80px;
    }

    .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 40px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.3); /* Garis putih agar lebih soft */
        padding-bottom: 40px;
        margin-bottom: 20px;
    }

    .footer-brand {
        display: flex;
        flex-direction: column;
        gap: 15px;
        max-width: 300px;
    }

    .footer-logo {
        width: 180px;
        cursor: pointer;
        transition: transform 0.3s ease, filter 0.3s ease;
        filter: drop-shadow(0 4px 6px rgba(74, 44, 64, 0.2)); /* Shadow disesuaikan */
    }

    .footer-logo:hover {
        transform: scale(1.05);
        filter: drop-shadow(0 8px 10px rgba(74, 44, 64, 0.4));
    }

    .footer-brand p {
        font-size: 14px; /* Sedikit diperkecil agar manis */
        line-height: 1.7;
        color: rgba(23, 3, 31, 0.85);
    }

    .footer-center, .footer-social {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .footer-title {
        font-family: 'Playfair Display', serif; /* PAKAI PLAYFAIR DISPLAY */
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 5px;
        color: #4a2c40;
    }

    .footer-links {
        display: flex;
        flex-direction: column;
        gap: 12px;
        list-style: none;
    }

    .footer-links a {
        text-decoration: none;
        color: rgba(23, 3, 31, 0.85);
        font-size: 14px;
        transition: all 0.3s ease;
        width: fit-content;
    }

    .footer-links a:hover {
        color: #ffffff; /* JADI PUTIH SAAT HOVER */
        padding-left: 8px;
    }

    .social-icons {
        display: flex;
        gap: 15px;
    }

    .social-icons a {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background-color: rgba(74, 44, 64, 0.15); /* Pink transparan */
        transition: all 0.3s ease;
    }

    .social-icons a img {
        width: 20px;
        height: 20px;
        transition: all 0.3s ease;
        /* Pastikan ikon berwarna gelap, jika ikonmu putih, hapus filter ini */
        filter: brightness(0) invert(15%) sepia(25%) saturate(2000%) hue-rotate(270deg); 
    }

    .social-icons a:hover {
        background-color: #4a2c40; 
        transform: translateY(-3px);
    }

    .social-icons a:hover img {
        transform: scale(1.1);
        filter: brightness(0) invert(100%); 
    }

    .footer-bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        flex-wrap: wrap;
        gap: 10px;
        color: rgba(23, 3, 31, 0.7);
    }

    /* Responsive untuk layar HP */
    @media screen and (max-width: 768px) {
        .footer {
            padding: 40px 20px 20px 20px;
        }

        .footer-content {
            flex-direction: column;
            text-align: center;
            align-items: center;
            gap: 30px;
        }

        .footer-brand {
            align-items: center;
        }

        .footer-center, .footer-social {
            align-items: center;
        }

        .footer-links {
            align-items: center;
        }

        .footer-links a:hover {
            padding-left: 0;
            transform: scale(1.05);
        }

        .footer-bottom {
            flex-direction: column;
            text-align: center;
        }
    }
</style>

<footer class="footer">

            <p>Aksesoris handmade penuh cinta untuk momen berhargamu.</p>
        </div>

        <!-- Bagian Tengah -->

            </ul>
        </div>

        <!-- Bagian Kanan: Sosial Media -->

                <a href="https://www.instagram.com/eka_zamzammecca_craft" target="_blank" rel="noopener noreferrer"
                    title="Instagram">
                    <img src="public/icons/ig.svg" alt="Instagram">

                    <img src="public/icons/fb.svg" alt="Facebook">
                </a>
            </div>
        </div>
    </div>

    <!-- Bagian Bawah: Copyright -->
    <div class="footer-bottom">

    </div>
</footer>
