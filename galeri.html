<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/galeri.css">
    <title>Galeri - ZamzamMecca CRAFT</title>
</head>

<body>
    <nav id="nav-container"></nav>

    <header class="galeri-hero">
        <h1>Inspirasi & Karya Kami</h1>
        <p>Kumpulan momen indah dan kebahagiaan yang telah kami rangkai untuk orang-orang spesial.</p>
    </header>

    <main>
        <section class="galeri-grid">
            <!-- Siapkan gambar-gambar di folder public/img/galeri/ -->
            <div class="galeri-item" onclick="bukaLightbox(this)">
                <img src="public/img/galeri/galeri1.jpeg" alt="Karya ZamzamMecca 1">
            </div>
            <div class="galeri-item" onclick="bukaLightbox(this)">
                <img src="public/img/galeri/galeri2.jpeg" alt="Karya ZamzamMecca 2">
            </div>
            <div class="galeri-item" onclick="bukaLightbox(this)">
                <img src="public/img/galeri/galeri3.jpeg" alt="Karya ZamzamMecca 3">
            </div>
            <div class="galeri-item" onclick="bukaLightbox(this)">
                <img src="public/img/galeri/galeri4.jpeg" alt="Karya ZamzamMecca 4">
            </div>
            <div class="galeri-item" onclick="bukaLightbox(this)">
                <img src="public/img/galeri/galeri5.jpeg" alt="Karya ZamzamMecca 5">
            </div>
            <div class="galeri-item" onclick="bukaLightbox(this)">
                <img src="public/img/galeri/galeri6.jpeg" alt="Karya ZamzamMecca 6">
            </div>
            <!-- Tambahkan lebih banyak sesuai fotomu -->
        </section>
    </main>

    <!-- Lightbox Modal (Untuk memperbesar gambar) -->
    <div id="lightbox-modal" class="lightbox-overlay" onclick="tutupLightbox()">
        <button class="lightbox-tutup" onclick="tutupLightbox()">&times;</button>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Preview Gambar">
    </div>

    <footer id="footer-container"></footer>

    <script src="js/main.js"></script>

    <!-- Script Lightbox Galeri -->
    <script>
        function bukaLightbox(element) {
            const img = element.querySelector('img');
            const modal = document.getElementById('lightbox-modal');
            const modalImg = document.getElementById('lightbox-img');

            modalImg.src = img.src;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Cegah scroll
        }

        function tutupLightbox() {
            const modal = document.getElementById('lightbox-modal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto'; // Kembalikan scroll
        }
    </script>
</body>

</html>
